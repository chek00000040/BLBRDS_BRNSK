<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Щиты Брянска — карта рекламных конструкций</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg: #14110f;
    --bg-2: #1c1814;
    --panel: #211c17;
    --ink: #f1ece2;
    --ink-dim: #a89c8a;
    --line: #3a322a;
    --accent: #ff7a1a;
    --accent-dim: #c75e10;
    --free: #4caf6e;
    --busy: #e2462f;
    --mono: 'JetBrains Mono', 'Share Tech Mono', monospace;
    --display: 'Oswald', 'Bebas Neue', sans-serif;
  }
  @font-face{
    font-family:'Oswald';
    src: local('Oswald');
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink); font-family:var(--mono); }

  /* top bar — styled like a billboard frame ledger */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px; background:var(--bg-2); border-bottom:3px solid var(--accent);
    position:relative; z-index:20;
  }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand .mark{
    font-family:var(--display); font-size:26px; letter-spacing:1px; text-transform:uppercase;
    color:var(--ink); font-weight:700;
  }
  .brand .mark span{ color:var(--accent); }
  .brand .sub{ font-size:11px; color:var(--ink-dim); letter-spacing:2px; text-transform:uppercase; }

  .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .toggle-group{ display:flex; border:1px solid var(--line); border-radius:4px; overflow:hidden; }
  .toggle-group button{
    background:var(--panel); color:var(--ink-dim); border:none; padding:8px 14px;
    font-family:var(--mono); font-size:12px; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
    transition:.15s;
  }
  .toggle-group button.active{ background:var(--accent); color:#1a1410; font-weight:700; }
  .toggle-group button:not(.active):hover{ background:#2a241d; color:var(--ink); }

  select#districtFilter{
    background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:4px;
    padding:8px 10px; font-family:var(--mono); font-size:12px;
  }

  .legend{ display:flex; gap:14px; font-size:11px; color:var(--ink-dim); align-items:center; }
  .legend .dot{ width:10px; height:10px; border-radius:2px; display:inline-block; margin-right:5px; vertical-align:middle; }

  main{ position:relative; height:calc(100vh - 60px); }
  #map{ width:100%; height:100%; background:#1c1814; }
  .leaflet-container{ background:#1c1814; }
  .leaflet-div-icon{ background:transparent; border:none; }

  /* sidebar card */
  #card{
    position:absolute; top:18px; right:18px; width:340px; max-width:90vw;
    background:var(--panel); border:1px solid var(--line); border-left:4px solid var(--accent);
    border-radius:6px; box-shadow:0 12px 30px rgba(0,0,0,.5);
    z-index:1100; display:none; overflow:hidden;
  }
  #card.show{ display:block; }
  #card .photo{
    width:100%; height:160px; background:#0e0c0a center/cover no-repeat;
    display:flex; align-items:center; justify-content:center; color:var(--ink-dim); font-size:11px;
    border-bottom:1px solid var(--line);
  }
  #card .body{ padding:14px 16px 16px; }
  #card .id{ font-size:10px; color:var(--ink-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  #card .address{ font-family:var(--display); font-size:19px; line-height:1.25; margin-bottom:8px; }
  #card .district{ font-size:11px; color:var(--ink-dim); margin-bottom:10px; }
  #card .status-row{ display:flex; align-items:center; gap:8px; margin-bottom:14px; padding:8px 10px;
    border-radius:4px; border:1px solid var(--line); background:rgba(0,0,0,.2); }
  #card .status-dot{ width:10px; height:10px; border-radius:50%; flex:none; }
  #card .status-text{ font-size:12px; }
  #card .status-text b{ display:block; font-size:13px; }

  #card .close{
    position:absolute; top:8px; right:10px; background:none; border:none; color:var(--ink-dim);
    font-size:18px; cursor:pointer; line-height:1;
  }
  #card .close:hover{ color:var(--ink); }

  /* booking form */
  #bookForm{ display:none; flex-direction:column; gap:8px; margin-top:6px; }
  #bookForm.show{ display:flex; }
  #bookForm input{
    background:#15110d; border:1px solid var(--line); color:var(--ink); padding:8px 10px;
    border-radius:4px; font-family:var(--mono); font-size:12px;
  }
  #bookForm label{ font-size:10px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:-4px; }
  .btn{
    background:var(--accent); color:#1a1410; border:none; padding:10px 14px; border-radius:4px;
    font-family:var(--mono); font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:12px;
    cursor:pointer; transition:.15s;
  }
  .btn:hover{ background:#ff8c3a; }
  .btn.secondary{ background:transparent; border:1px solid var(--line); color:var(--ink-dim); }
  .btn.secondary:hover{ color:var(--ink); border-color:var(--ink-dim); }
  #formMsg{ font-size:11px; color:var(--free); display:none; }
  #formMsg.show{ display:block; }
  #formErr{ font-size:11px; color:var(--busy); display:none; }
  #formErr.show{ display:block; }

  .billboard-pin{
    width:30px; height:34px; cursor:pointer; filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
    transition: transform .12s;
  }
  .billboard-pin:hover{ transform: scale(1.15); }

  footer.note{
    position:absolute; bottom:14px; left:18px; z-index:15; font-size:10px; color:var(--ink-dim);
    background:rgba(28,24,20,.85); padding:6px 10px; border-radius:4px; border:1px solid var(--line);
  }

  @media (max-width: 640px){
    header{ flex-direction:column; align-items:flex-start; gap:10px; }
    #card{ left:10px; right:10px; width:auto; top:auto; bottom:10px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">щиты<span>брянска</span></div>
    <div class="sub">карта рекламных конструкций</div>
  </div>
  <div class="controls">
    <select id="districtFilter">
      <option value="">Все районы</option>
    </select>
    <div class="toggle-group">
      <button id="btnYandex" class="active">Яндекс</button>
      <button id="btnOsm">OSM</button>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:var(--free)"></span>свободен</span>
      <span><span class="dot" style="background:var(--busy)"></span>занят</span>
    </div>
  </div>
</header>

<main>
  <div id="map"></div>

  <div id="card">
    <button class="close" id="cardClose">&times;</button>
    <div class="photo" id="cardPhoto">фото не загружено</div>
    <div class="body">
      <div class="id" id="cardId">—</div>
      <div class="address" id="cardAddress">—</div>
      <div class="district" id="cardDistrict">—</div>
      <div class="status-row">
        <span class="status-dot" id="cardDot"></span>
        <span class="status-text" id="cardStatusText"><b>—</b></span>
      </div>

      <button class="btn" id="bookBtn">Забронировать щит</button>

      <div id="bookForm">
        <label>Дата начала аренды</label>
        <input type="date" id="dateFrom">
        <label>Дата окончания аренды</label>
        <input type="date" id="dateTo">
        <label>Имя</label>
        <input type="text" id="clientName" placeholder="Иван Иванов">
        <label>Телефон</label>
        <input type="tel" id="clientPhone" placeholder="+7 900 000-00-00">
        <div id="formErr">Период пересекается с уже занятым — выберите другие даты.</div>
        <div id="formMsg">Заявка отправлена. Менеджер свяжется с вами.</div>
        <div style="display:flex; gap:8px; margin-top:4px;">
          <button class="btn" id="submitBook">Отправить заявку</button>
          <button class="btn secondary" id="cancelBook">Отмена</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="note">83 щита в 4 районах • данные синхронизируются из Google Таблицы</footer>
</main>

// URL веб-приложения Google Apps Script (заполнить после деплоя скрипта на стороне таблицы)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxqg7CD9KchKQVcjfpCozHiHprNKqIE16cYo92iexG8iv-wTDNE7ZiLkSkJW0CyT2x/exec";

const DISTRICT_COLORS = {
  'Советский район': '#ff7a1a55',
  'Фокинский район': '#4caf6e55',
  'Володарский район': '#3a8ee655',
  'Бежицкий район': '#e2462f55',
};

function todayISO(){ return new Date().toISOString().slice(0,10); }

function getStatus(bb){
  const today = todayISO();
  // занято, если статус явно выставлен в busy
  if(bb.status === 'busy'){
    return { busy:true, until: bb.busy_to || '' };
  }
  // занято, если сегодня внутри [busy_from, busy_to]
  if(bb.busy_from && bb.busy_to && bb.busy_from <= today && today <= bb.busy_to){
    return { busy:true, until: bb.busy_to };
  }
  return { busy:false };
}

function rangesOverlap(aFrom, aTo, bFrom, bTo){
  return aFrom <= bTo && bFrom <= aTo;
}

function pinSvg(color){
  return `<svg class="billboard-pin" viewBox="0 0 30 34" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="26" height="16" rx="2" fill="${color}" stroke="#14110f" stroke-width="1.5"/>
    <line x1="9" y1="18" x2="6" y2="32" stroke="#14110f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21" y1="18" x2="24" y2="32" stroke="#14110f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7" y1="6" x2="23" y2="6" stroke="#14110f" stroke-width="1" opacity=".5"/>
    <line x1="7" y1="10" x2="23" y2="10" stroke="#14110f" stroke-width="1" opacity=".5"/>
    <line x1="7" y1="14" x2="19" y2="14" stroke="#14110f" stroke-width="1" opacity=".5"/>
  </svg>`;
}

function pinSvgActive(color){
  return `<svg class="billboard-pin" viewBox="0 0 38 42" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="36" height="20" rx="3" fill="${color}" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="1" y="1" width="36" height="20" rx="3" fill="none" stroke="#ff7a1a" stroke-width="1.5" opacity="0.8"/>
    <line x1="11" y1="21" x2="8" y2="40" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="27" y1="21" x2="30" y2="40" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="9" y1="7" x2="29" y2="7" stroke="#14110f" stroke-width="1" opacity=".5"/>
    <line x1="9" y1="12" x2="29" y2="12" stroke="#14110f" stroke-width="1" opacity=".5"/>
    <line x1="9" y1="17" x2="24" y2="17" stroke="#14110f" stroke-width="1" opacity=".5"/>
  </svg>`;
}

let activeBillboard = null;
let activeMarkerBb = null;
let map, markersLayer, polygonsLayer;

function setMarkerActive(bb, active){
  if(!bb) return;
  if(window.__engine === 'yandex'){ setMarkerActiveYandex(bb, active); return; }
  if(!bb.__marker) return;
  const st = getStatus(bb);
  const color = st.busy ? '#e2462f' : '#4caf6e';
  const html = active ? pinSvgActive(color) : pinSvg(color);
  const size = active ? [38, 42] : [30, 34];
  const anchor = active ? [19, 42] : [15, 34];
  bb.__marker.setIcon(L.divIcon({ className:'', html, iconSize: size, iconAnchor: anchor }));
  bb.__marker.setZIndexOffset(active ? 1000 : 0);
}

function panToReveal(bb){
  if(!map || window.__engine !== 'osm') return;
  const cardWidth = document.getElementById('card').offsetWidth || 340;
  const targetPoint = map.project([bb.lat, bb.lon], map.getZoom()).subtract([(cardWidth/2) + 30, 0]);
  map.panTo(map.unproject(targetPoint, map.getZoom()), { animate:true, duration:0.35 });
}

function openCard(bb){
  if(activeMarkerBb && activeMarkerBb !== bb) setMarkerActive(activeMarkerBb, false);
  activeMarkerBb = bb;
  setMarkerActive(bb, true);
  activeBillboard = bb;
  const st = getStatus(bb);
  document.getElementById('cardId').textContent = bb.id.toUpperCase();
  document.getElementById('cardAddress').textContent = bb.address;
  document.getElementById('cardDistrict').textContent = bb.district || '—';
  const dot = document.getElementById('cardDot');
  const txt = document.getElementById('cardStatusText');
  if(st.busy){
    dot.style.background = 'var(--busy)';
    txt.innerHTML = '<b>Занято</b>свободен с ' + formatDate(st.until);
  } else {
    dot.style.background = 'var(--free)';
    txt.innerHTML = '<b>Свободен</b>доступен для бронирования';
  }
  const photo = document.getElementById('cardPhoto');
  if(bb.photo){
    photo.style.backgroundImage = `url('${bb.photo}')`;
    photo.textContent = '';
  } else {
    photo.style.backgroundImage = '';
    photo.textContent = 'фото не загружено';
  }
  document.getElementById('bookForm').classList.remove('show');
  document.getElementById('formErr').classList.remove('show');
  document.getElementById('formMsg').classList.remove('show');
  document.getElementById('card').classList.add('show');
}

function formatDate(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.${y}`;
}

document.getElementById('cardClose').onclick = () => {
  if(activeMarkerBb) { setMarkerActive(activeMarkerBb, false); activeMarkerBb = null; }
  document.getElementById('card').classList.remove('show');
};

document.getElementById('bookBtn').onclick = () => {
  document.getElementById('bookForm').classList.toggle('show');
};
document.getElementById('cancelBook').onclick = () => {
  document.getElementById('bookForm').classList.remove('show');
};

document.getElementById('submitBook').onclick = async () => {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();
  const errEl = document.getElementById('formErr');
  const msgEl = document.getElementById('formMsg');
  errEl.classList.remove('show'); msgEl.classList.remove('show');

  if(!from || !to || !name || !phone){
    errEl.textContent = 'Заполните все поля.';
    errEl.classList.add('show');
    return;
  }
  if(from > to){
    errEl.textContent = 'Дата начала позже даты окончания.';
    errEl.classList.add('show');
    return;
  }
  if(activeBillboard.busy_from && activeBillboard.busy_to &&
     rangesOverlap(from, to, activeBillboard.busy_from, activeBillboard.busy_to)){
    errEl.textContent = 'Период пересекается с уже занятым — выберите другие даты.';
    errEl.classList.add('show');
    return;
  }

  const payload = {
    action: 'new_order',
    billboard_id: activeBillboard.id,
    address: activeBillboard.address,
    district: activeBillboard.district,
    from, to, name, phone,
    created_at: new Date().toISOString()
  };

  try{
    if(APPS_SCRIPT_URL && APPS_SCRIPT_URL.startsWith('http')){
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // Apps Script web apps обычно требуют no-cors из браузера
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
    } else {
      console.log('APPS_SCRIPT_URL не настроен. Заявка (демо):', payload);
    }
    msgEl.classList.add('show');
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
  } catch(e){
    errEl.textContent = 'Ошибка отправки. Попробуйте ещё раз.';
    errEl.classList.add('show');
  }
};

// district filter dropdown
function populateDistrictFilter(){
  const sel = document.getElementById('districtFilter');
  const districts = [...new Set(BILLBOARDS.map(b => b.district))].sort();
  districts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

// подтягиваем актуальные статусы/фото из Google Таблицы поверх встроенных данных
async function loadLiveData(){
  if(!APPS_SCRIPT_URL || !APPS_SCRIPT_URL.startsWith('http')) return;
  try{
    const res = await fetch(APPS_SCRIPT_URL);
    const live = await res.json();
    const byId = {};
    live.forEach(r => { byId[r.id] = r; });
    BILLBOARDS.forEach(bb => {
      const r = byId[bb.id];
      if(r){
        bb.status = r.status || bb.status;
        bb.busy_from = r.busy_from || '';
        bb.busy_to = r.busy_to || '';
        bb.photo = r.photo || '';
        bb.district = r.district || bb.district;
        bb.address = r.address || bb.address;
      }
    });
    console.log('Загружены живые данные из таблицы:', live.length, 'щитов');
  } catch(e){
    console.warn('Не удалось загрузить данные из таблицы, использую встроенные:', e);
  }
}

// ====== ДВИЖОК: OSM (Leaflet) ======
async function initMapOSM(){
  map = L.map('map', { zoomControl: true }).setView([53.295, 34.30], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
  }).addTo(map);

  polygonsLayer = L.layerGroup().addTo(map);
  markersLayer  = L.layerGroup().addTo(map);

  DISTRICTS_GEOJSON.features.forEach(f => {
    const color = (DISTRICT_COLORS[f.properties.name] || '#888888').slice(0,7);
    L.geoJSON(f, { style:{ color:'#1c1814', weight:2, fillColor:color, fillOpacity:0.35 } })
      .bindTooltip(f.properties.name, { sticky:true })
      .addTo(polygonsLayer);
  });

  BILLBOARDS.forEach(bb => {
    const st = getStatus(bb);
    const color = st.busy ? '#e2462f' : '#4caf6e';
    const icon = L.divIcon({ className:'', html:pinSvg(color), iconSize:[30,34], iconAnchor:[15,34] });
    const marker = L.marker([bb.lat, bb.lon], { icon });
    marker.on('click', () => { openCard(bb); panToReveal(bb); });
    bb.__marker = marker;
    marker.addTo(markersLayer);
  });

  map.on('click', () => {
    if(activeMarkerBb){ setMarkerActive(activeMarkerBb, false); activeMarkerBb = null; }
    document.getElementById('card').classList.remove('show');
  });
}

// ====== ДВИЖОК: Яндекс Карты v3 ======
function loadYandexScript(apikey){
  return new Promise((resolve, reject) => {
    if(window.ymaps3){ resolve(); return; }
    const s = document.createElement('script');
    s.src = `https://api-maps.yandex.ru/v3/?apikey=${apikey}&lang=ru_RU`;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function initMapYandex(apikey){
  await loadYandexScript(apikey);
  await ymaps3.ready;
  const { YMap, YMapDefaultSchemeLayer, YMapDefaultFeaturesLayer, YMapMarker, YMapFeature } = ymaps3;

  map = new YMap(document.getElementById('map'), {
    location:{ center:[34.30, 53.295], zoom:12 }
  });
  map.addChild(new YMapDefaultSchemeLayer({}));
  map.addChild(new YMapDefaultFeaturesLayer({}));

  // полигоны районов
  DISTRICTS_GEOJSON.features.forEach(f => {
    const color = (DISTRICT_COLORS[f.properties.name] || '#88888855').slice(0,7);
    const multiCoords = f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates : [f.geometry.coordinates];
    multiCoords.forEach(poly => {
      map.addChild(new YMapFeature({
        geometry:{ type:'Polygon', coordinates:poly },
        style:{ fill:color+'88', stroke:[{ color:'#1c1814', width:2 }] }
      }));
    });
  });

  // маркеры
  BILLBOARDS.forEach(bb => {
    const st = getStatus(bb);
    const color = st.busy ? '#e2462f' : '#4caf6e';
    const el = document.createElement('div');
    el.innerHTML = pinSvg(color);
    el.style.cursor = 'pointer';
    el.addEventListener('click', (e) => { e.stopPropagation(); openCard(bb); panToRevealYandex(bb); });
    const marker = new YMapMarker({ coordinates:[bb.lon, bb.lat] }, el);
    bb.__marker_el = el;
    bb.__marker_ym = marker;
    map.addChild(marker);
  });

  // клик по карте — закрыть карточку
  map.addChild(new (ymaps3.YMapListener)({
    layer:'any',
    onClick: () => {
      if(activeMarkerBb){ setMarkerActiveYandex(activeMarkerBb, false); activeMarkerBb = null; }
      document.getElementById('card').classList.remove('show');
    }
  }));

  window.__engine = 'yandex';
}

function panToRevealYandex(bb){
  if(!map || window.__engine !== 'yandex') return;
  const cardWidth = document.getElementById('card').offsetWidth || 340;
  map.update({ location:{ center:[bb.lon - 0.02, bb.lat], duration:350 } });
}

function setMarkerActiveYandex(bb, active){
  if(!bb || !bb.__marker_el) return;
  const st = getStatus(bb);
  const color = st.busy ? '#e2462f' : '#4caf6e';
  bb.__marker_el.innerHTML = active ? pinSvgActive(color) : pinSvg(color);
}

// ====== ОПРЕДЕЛЕНИЕ СТРАНЫ И ЗАПУСК ======
const YMAPS_KEY = '8e1b2488-bee2-41f0-a877-8e22c9bc8c03';

async function detectCountry(){
  // 1. Если пользователь уже выбрал руками — уважаем его выбор
  const saved = localStorage.getItem('mapEngine');
  if(saved) return saved;
  // 2. Гео-детект через бесплатный IP API (таймаут 3с)
  try{
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 3000);
    const r = await fetch('https://ipapi.co/json/', { signal: ctrl.signal });
    const d = await r.json();
    return d.country_code === 'RU' ? 'yandex' : 'osm';
  } catch(e){
    return 'osm'; // fallback: OSM — работает везде
  }
}

function setEngineButtons(engine){
  document.getElementById('btnYandex').classList.toggle('active', engine === 'yandex');
  document.getElementById('btnOsm').classList.toggle('active', engine === 'osm');
}

async function startMap(){
  await loadLiveData();
  const engine = await detectCountry();
  window.__engine = engine;
  setEngineButtons(engine);

  if(engine === 'yandex'){
    try{
      await initMapYandex(YMAPS_KEY);
    } catch(e){
      console.warn('Яндекс Карты не загрузились, переключаюсь на OSM:', e);
      window.__engine = 'osm';
      setEngineButtons('osm');
      document.getElementById('map').innerHTML = '';
      await initMapOSM();
    }
  } else {
    await initMapOSM();
  }
}

// ====== КНОПКИ ПЕРЕКЛЮЧЕНИЯ ======
document.getElementById('btnYandex').addEventListener('click', async function(){
  if(window.__engine === 'yandex') return;
  localStorage.setItem('mapEngine','yandex');
  location.reload();
});
document.getElementById('btnOsm').addEventListener('click', async function(){
  if(window.__engine === 'osm') return;
  localStorage.setItem('mapEngine','osm');
  location.reload();
});

startMap();
populateDistrictFilter();

document.getElementById('districtFilter').addEventListener('change', (e) => {
  const val = e.target.value;
  BILLBOARDS.forEach(bb => {
    const show = !val || bb.district === val;
    if(window.__engine === 'osm' && bb.__marker){
      const onMap = markersLayer.hasLayer(bb.__marker);
      if(show && !onMap) markersLayer.addLayer(bb.__marker);
      if(!show && onMap) markersLayer.removeLayer(bb.__marker);
    } else if(window.__engine === 'yandex' && bb.__marker_el){
      bb.__marker_el.parentElement.style.display = show ? '' : 'none';
    }
  });
});

// автообновление данных каждые 5 минут
setInterval(async () => {
  await loadLiveData();
  BILLBOARDS.forEach(bb => {
    const isActive = bb === activeMarkerBb;
    const st = getStatus(bb);
    const color = st.busy ? '#e2462f' : '#4caf6e';
    if(window.__engine === 'osm' && bb.__marker){
      const html = isActive ? pinSvgActive(color) : pinSvg(color);
      const size = isActive ? [38,42] : [30,34];
      const anchor = isActive ? [19,42] : [15,34];
      bb.__marker.setIcon(L.divIcon({ className:'', html, iconSize:size, iconAnchor:anchor }));
    } else if(window.__engine === 'yandex' && bb.__marker_el){
      bb.__marker_el.innerHTML = isActive ? pinSvgActive(color) : pinSvg(color);
    }
  });
}, 5 * 60 * 1000);
</script>
